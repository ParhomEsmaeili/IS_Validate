name: Feature
description: Raise a feature request
title: "[Feature]: "
labels: ["enhancement"]
# type: Feature
projects: ["4"]
body:
  - type: input
    id: short-description
    attributes:
      label: Description
      placeholder: ex. There should be metric utility to compute X metric for a given algorithm feature.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What are one or more acceptance criteria that would be used to verify this feature is working as expected?
      placeholder: ex. The metric is computed correctly and integrated such that it can be configured in the evaluation pipeline.
    validations:
      required: true
  - type: textarea
    id: technical-considerations
    attributes:
      label: Technical considerations
      description: Are there any technical considerations for this feature?
      placeholder: ex. This feature will require a new utility which is integrated with the existing evaluation framework.
    validations:
      required: false
  - type: checkboxes
    id: project-admin
    attributes:
      label: Assign the relevant label(s) and, if known, Milestone to this feature request
      options:
        - label: I confirm I have assigned the relevant label(s) and, if known, Milestone to this feature request
          required: true
